server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Static assets must 404 when missing — never fall back to index.html (poisons image cache).
    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=86400";
    }

    location /src/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=300";
    }

    location /styles/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=300";
    }

    location = /game {
        return 308 /game/;
    }

    # SPA shell only for top-level routes
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "public, max-age=300";
    }

    # Fonts load from Google CDN — game shell is same-origin only
    gzip on;
    gzip_types text/css application/javascript text/html;
    gzip_min_length 256;
}
