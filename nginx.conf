server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Mobile game: no caching during active iteration (safe for static assets in one deploy)
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "public, max-age=300";
    }

    location ~* \.(js|css|html)$ {
        add_header Cache-Control "public, max-age=300";
    }

    # Fonts load from Google CDN — game shell is same-origin only
    gzip on;
    gzip_types text/css application/javascript text/html;
    gzip_min_length 256;
}
