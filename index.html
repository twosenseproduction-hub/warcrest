<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Warcrest — Ashfen Reach</title>
  <link rel="icon" type="image/png" href="assets/ui/favicon.png" />
  <link rel="stylesheet" href="styles/base.css" />
  <link rel="stylesheet" href="styles/hud.css" />
  <link rel="stylesheet" href="styles/menu.css" />
  <link rel="stylesheet" href="styles/building-menu.css" />
  <link rel="stylesheet" href="styles/radial-menu.css" />
  <link rel="stylesheet" href="styles/map-tools.css" />
</head>
<body>
  <!-- ═══════════════════════════════ TOP BAR ═══════════════════════════════ -->
  <div id="topbar">
    <div class="res-row">
      <span class="res-pill gold"><img class="ic-ts" src="assets/tiny-swords/UI%20Elements/UI%20Elements/Icons/Icon_03.png" alt="" /><span id="res-gold" class="val">0</span></span>
      <span class="res-pill halcite"><img class="ic-ts" src="assets/tiny-swords/UI%20Elements/UI%20Elements/Icons/Icon_03.png" alt="" /><span id="res-halcite" class="val">0</span></span>
      <span class="res-pill supply"><img class="ic-ts" src="assets/tiny-swords/UI%20Elements/UI%20Elements/Icons/Icon_06.png" alt="" /><span id="res-supply" class="val">0/0</span></span>
    </div>
    <div class="top-center">
      <button type="button" class="ts-round-btn hidden" id="btn-wave-timer" aria-label="Wave timer"><img src="assets/tiny-swords/UI%20Elements/UI%20Elements/Icons/Icon_14.png" alt="" /><span id="wave-countdown">0s</span></button>
      <span id="match-timer" class="hidden">0:45</span>
    </div>
    <div class="top-right">
      <button type="button" class="ts-round-btn" id="btn-faction-menu" aria-label="Faction"><img src="assets/ui/warcrest-helmet.png" alt="" /></button>
      <button type="button" class="ts-round-btn" id="btn-settings" aria-label="Settings"><img src="assets/tiny-swords/UI%20Elements/UI%20Elements/Icons/Icon_01.png" alt="" /></button>
    </div>
  </div>

  <!-- ═══════════════════════════ OBJECTIVE BANNER ════════════════════════════ -->
  <div id="objective-banner" class="hidden"></div>

  <!-- ════════════════════════════ MAP-TOOL STRIP ══════════════════════════════ -->
  <div id="map-tools">
    <button type="button" class="map-tool-btn ts-round-btn hidden" id="btn-rail-army" aria-label="Select army"><img src="assets/tiny-swords/UI%20Elements/UI%20Elements/Icons/Icon_05.png" alt="" /></button>
  </div>

  <!-- ═══════════════════════════════ CANVAS ════════════════════════════════ -->
  <canvas id="game-canvas"></canvas>

  <!-- ══════════════════════════ COMBAT CLUSTER ════════════════════════════ -->
  <div id="combat-cluster" class="hidden">
    <div class="combat-ring">
      <button type="button" id="btn-combat-stop" class="combat-btn ts-round-btn red" aria-label="Stop"><img src="assets/tiny-swords/UI%20Elements/UI%20Elements/Icons/Icon_09.png" alt="" /></button>
      <button type="button" id="btn-combat-mode" class="combat-btn ts-round-btn red" aria-label="Mode"><img src="assets/tiny-swords/UI%20Elements/UI%20Elements/Icons/Icon_07.png" alt="" /></button>
      <button type="button" id="btn-combat-atk" class="combat-btn ts-round-btn red combat-primary" aria-label="Attack move"><img src="assets/tiny-swords/UI%20Elements/UI%20Elements/Icons/Icon_08.png" alt="" /></button>
    </div>
  </div>

  <!-- ══════════════════════════════ BOTTOM HUD ════════════════════════════ -->
  <div id="hud">
    <div id="hud-left">
      <div id="minimap-wrap"><canvas id="minimap"></canvas></div>
    </div>
    <div id="hud-center">
      <div id="squad-chips"></div>
      <div id="cmd-card"></div>
    </div>
    <div id="hud-right">
      <div id="portrait-strip"></div>
    </div>
  </div>

  <!-- ═══════════════════════ BUILDING MENU OVERLAY ════════════════════════ -->
  <div id="building-menu" class="hidden"></div>

  <!-- ════════════════════════════ RADIAL MENU ══════════════════════════════ -->
  <div id="radial-menu" class="hidden"></div>

  <!-- ══════════════════════════════ MAIN MENU ══════════════════════════════ -->
  <div id="main-menu">
    <div class="bg-grid"></div>
    <div class="menu-inner">
      <div class="logo">
        <img class="logo-helmet" src="assets/ui/warcrest-helmet.png" alt="" width="112" height="116" />
        <h1 class="logo-text">War<span class="logo-accent">crest</span></h1>
        <p class="logo-sub">Battle for the Ashfen Reach</p>
      </div>

      <div class="menu-actions">
        <button type="button" class="menu-btn primary" id="btn-start-game">Play</button>
        <button type="button" class="menu-btn" id="btn-open-scenario">Scenarios</button>
        <button type="button" class="menu-btn" id="btn-open-sandbox">Sandbox</button>
      </div>

      <div class="faction-cards">
        <div class="fc-card aurex">
          <div class="fc-name">Iron Crown</div>
          <div class="fc-tag">Iron &middot; Compact &middot; Advance</div>
        </div>
        <div class="fc-card cinder">
          <div class="fc-name">Raider Horde</div>
          <div class="fc-tag">Root &middot; Blood &middot; Reclaim</div>
        </div>
      </div>

      <div class="menu-footer">
        <span class="build-tag">v0.1-alpha</span>
      </div>
    </div>
  </div>

  <!-- ════════════════════════ SCENARIO SELECT MODAL ═══════════════════════ -->
  <div id="scenario-modal" class="modal hidden">
    <div class="modal-box">
      <div class="modal-header">
        <h2>Scenarios</h2>
        <button type="button" class="modal-close" id="btn-close-scenario" aria-label="Close">✕</button>
      </div>
      <div id="scenario-list" class="scenario-list"></div>
    </div>
  </div>

  <!-- ════════════════════════ SANDBOX SELECT MODAL ════════════════════════ -->
  <div id="sandbox-modal" class="modal hidden">
    <div class="modal-box">
      <div class="modal-header">
        <h2>Sandbox</h2>
        <button type="button" class="modal-close" id="btn-close-sandbox" aria-label="Close">✕</button>
      </div>
      <div class="sandbox-form">
        <label>
          Map seed
          <input type="text" id="sandbox-seed" placeholder="random" />
        </label>
        <label>
          Your faction
          <select id="sandbox-faction">
            <option value="aurex">Iron Crown</option>
            <option value="cinder">Raider Horde</option>
          </select>
        </label>
        <label>
          Difficulty
          <select id="sandbox-difficulty">
            <option value="easy">Easy</option>
            <option value="normal" selected>Normal</option>
            <option value="hard">Hard</option>
          </select>
        </label>
        <button type="button" class="menu-btn primary" id="btn-start-sandbox">Start</button>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════ SETTINGS MODAL ════════════════════════════ -->
  <div id="settings-modal" class="modal hidden">
    <div class="modal-box">
      <div class="modal-header">
        <h2>Settings</h2>
        <button type="button" class="modal-close" id="btn-close-settings" aria-label="Close">✕</button>
      </div>
      <div class="settings-form">
        <label class="toggle-row">
          <span>Sound</span>
          <input type="checkbox" id="setting-sound" checked />
        </label>
        <label class="toggle-row">
          <span>Music</span>
          <input type="checkbox" id="setting-music" checked />
        </label>
        <label class="toggle-row">
          <span>Show grid</span>
          <input type="checkbox" id="setting-grid" />
        </label>
        <label class="toggle-row">
          <span>Show FPS</span>
          <input type="checkbox" id="setting-fps" />
        </label>
        <label>
          Camera speed
          <input type="range" id="setting-camspeed" min="0.5" max="3" step="0.1" value="1" />
        </label>
      </div>
    </div>
  </div>

  <!-- ══════════════════════════════ FACTION MODAL ════════════════════════════ -->
  <div id="faction-modal" class="modal hidden">
    <div class="modal-box">
      <div class="modal-header">
        <h2 id="faction-modal-title">Faction</h2>
        <button type="button" class="modal-close" id="btn-close-faction" aria-label="Close">✕</button>
      </div>
      <div id="faction-modal-body"></div>
    </div>
  </div>

  <!-- ════════════════════════════ TOAST LAYER ══════════════════════════════ -->
  <div id="toast-layer" aria-live="polite"></div>

  <!-- ═════════════════════════════ SCRIPTS ══════════════════════════════ -->
  <script src="src/config.js"></script>
  <script src="src/state.js"></script>
  <script src="src/assets.js"></script>
  <script src="src/audio.js"></script>
  <script src="src/entities.js"></script>
  <script src="src/sprites.js"></script>
  <script src="src/art.js"></script>
  <script src="src/terrain.js"></script>
  <script src="src/sapphire-terrain-mask.js"></script>
  <script src="src/sapphire-mapgen.js"></script>
  <script src="src/terraform-zones.js"></script>
  <script src="src/map.js"></script>
  <script src="src/pathfind.js"></script>
  <script src="src/size-ref.js"></script>
  <script src="src/render.js"></script>
  <script src="src/particles.js"></script>
  <script src="src/heroes.js"></script>
  <script src="src/unit-ai.js"></script>
  <script src="src/systems.js"></script>
  <script src="src/ai.js"></script>
  <script src="src/commands.js"></script>
  <script src="src/ui.js"></script>
  <script src="src/hud.js"></script>
  <script src="src/building-menu.js"></script>
  <script src="src/radial-menu.js"></script>
  <script src="src/input.js"></script>
  <script src="src/game.js"></script>
</body>
</html>
