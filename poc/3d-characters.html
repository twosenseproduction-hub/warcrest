<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Warcrest — procedural 3D character roster</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#0e1118;font-family:"Segoe UI",system-ui,sans-serif;}
  #c{display:block;width:100%;height:100%;touch-action:none;}
  .ctl{position:fixed;right:12px;top:12px;display:flex;flex-direction:column;gap:8px;}
  .btn{background:rgba(22,20,16,.82);color:#fff;border:none;border-radius:13px;width:48px;height:48px;font-size:20px;
    cursor:pointer;box-shadow:0 4px 14px rgba(0,0,0,.4);backdrop-filter:blur(5px);}
  .btn:active{transform:scale(.93);}
  .lbl{position:fixed;transform:translate(-50%,-100%);pointer-events:none;white-space:nowrap;
    background:rgba(22,20,16,.82);color:#fff;font-weight:700;font-size:11px;padding:3px 9px;border-radius:999px;
    box-shadow:0 3px 9px rgba(0,0,0,.4);backdrop-filter:blur(4px);}
  .rowlbl{position:fixed;transform:translateY(-50%);pointer-events:none;white-space:nowrap;
    color:#fff;font-weight:800;font-size:13px;text-shadow:0 2px 6px rgba(0,0,0,.6);display:flex;align-items:center;gap:7px;}
  .rowlbl b{width:12px;height:12px;border-radius:50%;}
  .title{position:fixed;left:50%;bottom:14px;transform:translateX(-50%);color:#fff;font-size:12px;font-weight:700;
    background:rgba(22,20,16,.7);padding:6px 14px;border-radius:999px;backdrop-filter:blur(5px);text-align:center;}
  .hint{position:fixed;left:12px;bottom:46px;color:rgba(255,255,255,.5);font-size:11px;font-weight:700;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="ctl">
  <button class="btn" id="bNight" title="Day/Night">🌙</button>
  <button class="btn" id="bSpin" title="Turntable">🔄</button>
  <button class="btn" id="bAnim" title="Idle / Walk">🚶</button>
</div>
<div class="rowlbl" id="R0"><b style="background:#3f63b8"></b>Iron Crown</div>
<div class="rowlbl" id="R1"><b style="background:#8a9a4a"></b>Raider Horde</div>
<div class="rowlbl" id="R2"><b style="background:#5a8f5a"></b>Rimwalkers</div>
<div class="hint">drag to orbit · scroll to zoom</div>
<div class="title">Warcrest — procedural 3D characters · stylized heroic armor (geometry I author in code)</div>

<script src="./three.min.js"></script>
<script>
const C=document.getElementById('c');
const renderer=new THREE.WebGLRenderer({canvas:C,antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled=true; renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.outputEncoding=THREE.sRGBEncoding;
const scene=new THREE.Scene();
const DAY={sky:0xd2e6ee,fog:0xcfe0d8,amb:0.52,sun:0xfff1d6,sunI:1.35,hemiS:0xe8ecdf,hemiG:0x46502f,hemiI:0.32};
const NIGHT={sky:0x182137,fog:0x1b2540,amb:0.5,sun:0x9fb0e0,sunI:0.5,hemiS:0x2a3658,hemiG:0x10141f,hemiI:0.4};
let mood=DAY, spin=true, walk=false;

const camera=new THREE.PerspectiveCamera(40,innerWidth/innerHeight,0.5,400);
let camDist=46,camYaw=Math.PI*0.5,camPitch=0.42;
function placeCam(){const tx=0,ty=4.4,tz=0;camera.position.set(tx+camDist*Math.cos(camYaw)*Math.cos(camPitch),ty+camDist*Math.sin(camPitch),tz+camDist*Math.sin(camYaw)*Math.cos(camPitch));camera.lookAt(tx,ty,tz);}

const amb=new THREE.AmbientLight(0xffffff,0.52); scene.add(amb);
const hemi=new THREE.HemisphereLight(0xe8ecdf,0x46502f,0.32); scene.add(hemi);
const sun=new THREE.DirectionalLight(0xfff1d6,1.35); sun.position.set(14,26,12); sun.castShadow=true;
sun.shadow.mapSize.set(2048,2048); const sc=sun.shadow.camera; sc.left=-34;sc.right=34;sc.top=24;sc.bottom=-24;sc.near=1;sc.far=90; sun.shadow.bias=-0.0004;
scene.add(sun); scene.add(sun.target);

/* ---- geometry helpers -------------------------------------------------- */
const M=(h,opts={})=>new THREE.MeshStandardMaterial(Object.assign({color:h,flatShading:true,roughness:1,metalness:0},opts));
function box(w,h,d,mat,x,y,z){const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat);m.position.set(x||0,y||0,z||0);m.castShadow=true;m.receiveShadow=true;return m;}
function cyl(r1,r2,h,seg,mat){const m=new THREE.Mesh(new THREE.CylinderGeometry(r1,r2,h,seg),mat);m.castShadow=true;return m;}
function cone(r,h,seg,mat){const m=new THREE.Mesh(new THREE.ConeGeometry(r,h,seg),mat);m.castShadow=true;return m;}
function sph(r,mat){const m=new THREE.Mesh(new THREE.IcosahedronGeometry(r,0),mat);m.castShadow=true;return m;}
function ring(r,t,mat){const m=new THREE.Mesh(new THREE.TorusGeometry(r,t,6,16),mat);m.castShadow=true;return m;}
function dome(r,mat){const m=new THREE.Mesh(new THREE.SphereGeometry(r,9,6,0,Math.PI*2,0,Math.PI*0.56),mat);m.castShadow=true;return m;}
function torusHalf(r,t,mat){const m=new THREE.Mesh(new THREE.TorusGeometry(r,t,5,14,Math.PI),mat);m.castShadow=true;return m;}
// trimmed plate: a base slab with a slightly larger trim slab behind it so a
// crisp gold border peeks out around every edge — the reference's signature.
function plate(w,h,d,base,trim,x,y,z){const g=new THREE.Group();g.position.set(x||0,y||0,z||0);
  g.add(box(w,h,d,base,0,0,0)); g.add(box(w+0.16,h+0.16,d*0.6,trim,0,0,-d*0.22)); return g;}

/* ---- per-race palette + proportions (stylized-heroic, chunky) ---------- */
const RACE={
  crown:{ skin:0xe6ab73, cloth:0x3f63b8, cloth2:0x2c477f, steel:0xb9c3d2, steelD:0x848fa0, gold:0xe4b53a, goldD:0xb98a23,
          leather:0x6b4a2a, beard:0xd1552a, hairY:0, gem:0x57d06a, cape:0xb22b33,
          scale:1.0, hunch:0.02, armLen:1.0, headR:0.56, build:1.12, legLen:0.9, hand:1.35, foot:1.4, pauld:1.0, beardBig:1 },
  horde:{ skin:0x6f9a3e, cloth:0x7a3a24, cloth2:0x55281a, steel:0x9aa0a8, steelD:0x6c727a, gold:0xb98a4a, goldD:0x8a6630,
          leather:0x4e351d, beard:0x241a10, hairY:0, gem:0xd6622a, cape:0x3a2418,
          scale:1.1, hunch:0.30, armLen:1.24, headR:0.58, build:1.5, legLen:0.82, hand:1.5, foot:1.4, pauld:1.25, beardBig:0.45 },
  elf:{   skin:0xe3c9a3, cloth:0x4f8a5a, cloth2:0x315a3a, steel:0xd8dde2, steelD:0xa9b0b8, gold:0xe6cf6a, goldD:0xc2a83f,
          leather:0x5a4a32, beard:0x000000, hairY:0xc9b46a, gem:0x6fe0c0, cape:0x2f6a4a,
          scale:1.06, hunch:-0.03, armLen:1.04, headR:0.5, build:0.96, legLen:1.12, hand:1.12, foot:1.1, pauld:0.85, beardBig:0 },
};

/* ============================================================================
 * Parametric humanoid — stylized heroic armor.
 * Layers gold-trimmed plate, dome pauldrons, beard, gems and a winged helm
 * over a chunky body. Returns a group with userData joints for animation.
 * Joints preserved for the animator: legL/legR(.userData.shin),
 * armL/armR(.userData.fore), headPivot, torsoPivot.
 * ========================================================================== */
function humanoid(race, role){
  const P=RACE[race];
  const heavy=(role==='warrior'||role==='hero');     // wears plate
  const sk=M(P.skin), cloth=M(P.cloth), cloth2=M(P.cloth2),
        steel=M(P.steel,{metalness:.35,roughness:.5}), steelD=M(P.steelD,{metalness:.3,roughness:.55}),
        gold=M(P.gold,{metalness:.55,roughness:.38}), goldD=M(P.goldD,{metalness:.5,roughness:.45}),
        leather=M(P.leather), beardM=M(P.beard), hairM=M(P.hairY||0x6a4422),
        gemM=M(P.gem,{emissive:P.gem,emissiveIntensity:.55,roughness:.3}),
        dark=M(0x241f17), white=M(0xeee7cf);
  const g=new THREE.Group();
  const bw=P.build, hsc=P.hand, fsc=P.foot;
  const limbMat=heavy?steelD:M(P.cloth2);

  // ---- legs (hip pivot → thigh, shin pivot → shin + big trimmed boot) ----
  function leg(side){
    const j=new THREE.Group(); j.position.set(0.36*bw*side,2.5*P.legLen,0);
    j.add(box(0.5*bw,1.05*P.legLen,0.54,heavy?steelD:leather,0,-0.52*P.legLen,0));
    const shin=new THREE.Group(); shin.position.y=-1.02*P.legLen;
    shin.add(box(0.44*bw,0.95*P.legLen,0.48,heavy?steel:leather,0,-0.48*P.legLen,0));
    // chunky boot with gold toe + ankle ring
    shin.add(box(0.56*bw*fsc,0.34,0.82*fsc,steelD,0,-0.98*P.legLen,0.12));
    shin.add(box(0.5*bw*fsc,0.2,0.34*fsc,gold,0,-1.0*P.legLen,0.45*fsc));   // gold toe cap
    if(heavy){const r=ring(0.32*bw,0.06,gold);r.rotation.x=Math.PI/2;r.position.y=-0.62*P.legLen;shin.add(r);}
    j.add(shin); j.userData={shin}; return j;
  }
  const legL=leg(-1), legR=leg(1); g.add(legL,legR);

  // ---- torso (chunky), hunch for orcs ----
  const torsoPivot=new THREE.Group(); torsoPivot.position.y=2.5*P.legLen; torsoPivot.rotation.x=P.hunch; g.add(torsoPivot);
  torsoPivot.add(box(1.4*bw,1.6,0.82,heavy?steelD:cloth,0,0.86,0));        // chest base
  if(heavy){
    torsoPivot.add(plate(1.3*bw,1.15,0.5,steel,gold,0,0.98,0.42));         // gold-trimmed breastplate
    if(role==='hero') torsoPivot.add(box(0.26,0.26,0.12,gemM,0,1.02,0.74));// chest gem
    // tassets / skirt below the belt
    torsoPivot.add(plate(1.2*bw,0.6,0.4,steelD,gold,0,0.0,0.34));
  } else {
    torsoPivot.add(box(0.46,1.5,0.06,M(P.gem,{roughness:1}),0,0.7,0.43).scale&&box(0.42,1.3,0.06,goldD,0,0.74,0.43)); // simple tabard stripe
  }
  // belt + buckle gem
  torsoPivot.add(box(1.42*bw,0.3,0.84,leather,0,0.18,0));
  torsoPivot.add(box(0.34,0.32,0.1,gold,0,0.18,0.45)); torsoPivot.add(box(0.16,0.16,0.06,gemM,0,0.18,0.5));

  // ---- dome pauldrons (steel cap + gold ring), bigger the heavier --------
  function pauldron(side){
    const grp=new THREE.Group(); grp.position.set(0.86*bw*side,1.62,0);
    const sz=(heavy?0.6:0.42)*P.pauld;
    grp.add(dome(sz,steel).translateY(-0.05));
    const r=ring(sz*0.92,0.07,gold); r.rotation.x=Math.PI/2; grp.add(r);
    if(race==='horde'){const sp=cone(0.18,0.5,5,white);sp.position.y=sz*0.7;sp.rotation.z=side*0.5;grp.add(sp);}
    if(heavy) torsoPivot.add(grp);
  }
  pauldron(-1); pauldron(1);

  // ---- arms (shoulder → upper, elbow → fore + big gauntlet) --------------
  function arm(side){
    const j=new THREE.Group(); j.position.set(0.78*bw*side,1.42,0);
    j.add(box(0.4,1.0*P.armLen,0.44,heavy?steel:M(P.cloth),0,-0.48*P.armLen,0));
    const fore=new THREE.Group(); fore.position.y=-0.94*P.armLen;
    fore.add(box(0.36,0.82*P.armLen,0.38,heavy?steelD:sk,0,-0.4*P.armLen,0));
    // oversized gauntlet / hand
    fore.add(box(0.5*hsc,0.42,0.5*hsc,heavy?steel:leather,0,-0.82*P.armLen,0.04));
    if(heavy) fore.add(box(0.5*hsc,0.12,0.5*hsc,gold,0,-0.66*P.armLen,0.04)); // gold cuff
    j.add(fore); j.userData={fore}; return j;
  }
  const armL=arm(-1), armR=arm(1); torsoPivot.add(armL,armR);

  // ---- neck + big head ----
  const headPivot=new THREE.Group(); headPivot.position.y=1.78; torsoPivot.add(headPivot);
  headPivot.add(cyl(0.2,0.24,0.26,8,sk).translateY(-0.08));
  const head=sph(P.headR,sk); head.scale.set(1,1.06,0.96); head.position.y=0.34; headPivot.add(head);
  headPivot.add(box(0.46,0.1,0.06,dark,0,0.4,P.headR*0.86));            // brow/eye line
  // beard (big & red for crown, scruff for horde, none for elf)
  if(P.beardBig>0){
    const b=P.beardBig;
    headPivot.add(box(0.62,0.5*b+0.2,0.42,beardM,0,0.12,P.headR*0.5));
    headPivot.add(box(0.5,0.5*b,0.36,beardM,0,-0.3*b,P.headR*0.55));
    headPivot.add(box(0.32,0.4*b,0.26,beardM,0,-0.7*b,P.headR*0.5));
  }
  if(race==='horde'){ headPivot.add(box(0.08,0.18,0.08,white,-0.17,0.16,P.headR*0.74));
    headPivot.add(box(0.08,0.18,0.08,white,0.17,0.16,P.headR*0.74)); }
  if(race==='elf'){ headPivot.add(cone(0.1,0.36,4,sk).translateX(-P.headR*0.95).translateY(0.36));
    headPivot.add(cone(0.1,0.36,4,sk).translateX(P.headR*0.95).translateY(0.36)); }

  // ---- helm / headgear ----
  if(heavy){
    if(race==='crown'){ // winged steel helm with gold brow (the reference)
      const helm=dome(P.headR+0.08,steel); helm.position.y=0.4; helm.scale.set(1,1.05,1); headPivot.add(helm);
      headPivot.add(box(0.9,0.18,0.9,gold,0,0.5,0));                    // gold brow band
      headPivot.add(box(0.12,0.5,0.14,steelD,0,0.5,P.headR*0.78));      // nose guard
      [-1,1].forEach(s=>{const wg=box(0.5,0.26,0.1,gold,0.5*s,0.62,-0.1);wg.rotation.z=s*0.5;headPivot.add(wg);}); // wings
      if(role==='hero')[-1,1].forEach(s=>{const w2=box(0.42,0.2,0.08,gold,0.62*s,0.82,-0.1);w2.rotation.z=s*0.7;headPivot.add(w2);});
    } else if(race==='horde'){ headPivot.add(box(P.headR*2,0.34,P.headR*2,steelD,0,0.5,0));
      [-1,1].forEach(s=>{const hn=cone(0.16,0.55,5,white);hn.position.set(0.32*s,0.82,0);hn.rotation.z=s*0.5;headPivot.add(hn);});
      headPivot.add(box(0.7,0.14,0.2,gold,0,0.42,P.headR*0.6)); }
    else { const helm=cone(P.headR+0.1,0.72,8,steel); helm.position.y=0.62; headPivot.add(helm);
      headPivot.add(ring(P.headR+0.04,0.06,gold).translateY(0.4));
      const r2=headPivot.children[headPivot.children.length-1]; r2.rotation.x=Math.PI/2;
      if(role==='hero') headPivot.add(box(0.8,0.5,0.06,gold,0,0.62,-P.headR*0.7)); }
  } else if(role==='archer'){ const hood=cone(P.headR+0.14,0.78,8,cloth2); hood.position.y=0.5; headPivot.add(hood);
      headPivot.add(box(P.headR*1.8,0.6,0.2,cloth2,0,0.2,-P.headR*0.7)); }
  else { const cap=dome(P.headR+0.05,hairM); cap.position.y=0.34; headPivot.add(cap);
      if(race==='elf') headPivot.add(box(0.18,1.0,0.18,hairM,0.18,-0.1,-P.headR*0.7)); } // ponytail

  // ---- cape (hero) ----
  if(role==='hero'){ const cape=box(1.4*bw,2.3,0.12,M(P.cape),0,0.5,-0.46); cape.rotation.x=0.13; torsoPivot.add(cape);
    torsoPivot.add(box(1.5*bw,0.3,0.16,gold,0,1.55,-0.42)); } // gold cape clasp bar

  // ---- weapons / tools (held in right fore) ----
  const rfore=armR.userData.fore, lfore=armL.userData.fore;
  function holdR(o){o.position.add(new THREE.Vector3(0,-0.95*P.armLen,0.06));rfore.add(o);}
  function band(grp,y){const r=cyl(0.13,0.13,0.12,8,gold);r.position.y=y;grp.add(r);}
  if(role==='worker'){
    const tool=new THREE.Group(); tool.add(cyl(0.07,0.07,1.8,6,leather).translateY(-0.2));
    tool.add(box(0.8,0.18,0.18,steelD,0,0.62,0)); tool.add(box(0.2,0.3,0.18,steel,0.34,0.6,0));
    holdR(tool); tool.rotation.z=0.5; armR.rotation.x=-0.5;
  } else if(role==='warrior'){
    if(race==='horde'){ const axe=new THREE.Group(); axe.add(cyl(0.1,0.1,2.1,6,leather));
      axe.add(box(0.22,0.95,1.05,steel,0,0.85,0.3)); axe.add(box(0.24,0.95,0.16,goldD,0,0.85,-0.18)); holdR(axe); axe.rotation.z=0.35; }
    else { const sw=new THREE.Group(); sw.add(box(0.13,1.8,0.14,steel,0,0.6,0)); sw.add(box(0.13,0.5,0.16,steelD,0,1.4,0));
      sw.add(box(0.6,0.16,0.18,gold,0,-0.2,0)); sw.add(box(0.16,0.4,0.16,leather,0,-0.5,0)); sw.add(sph(0.13,gold).translateY(-0.74)); holdR(sw); sw.rotation.z=0.18; }
    const shield=plate(0.14,1.2,0.95,race==='crown'?M(P.cloth):steelD,gold,-0.05,-0.4,0.22); lfore.add(shield);
    lfore.add(box(0.16,0.4,0.34,gemM,0.0,-0.4,0.3)); armL.rotation.x=-0.45;
  } else if(role==='archer'){
    const bow=torusHalf(1.0,0.07,gold); bow.rotation.z=Math.PI/2; bow.position.set(0,-0.5,0.28); lfore.add(bow);
    lfore.add(box(0.02,1.95,0.02,white,0,-0.5,0.28));
    armL.rotation.x=-0.5; armR.rotation.x=-0.58;
    torsoPivot.add(cyl(0.18,0.18,0.95,8,leather).translateX(-0.44).translateY(1.2).translateZ(-0.38));
    [0,0.11,-0.11].forEach(o=>torsoPivot.add(box(0.04,0.5,0.04,white,-0.44+o,1.82,-0.38)));
  } else if(role==='hero'){
    if(race==='crown'){ // two-handed warhammer (reference)
      const hm=new THREE.Group(); hm.add(cyl(0.11,0.11,2.5,8,leather).translateY(0.1));
      band(hm,1.0); band(hm,1.25);
      const head=box(0.78,0.95,0.7,steel,0,1.5,0); hm.add(head);
      hm.add(box(0.86,0.3,0.78,gold,0,1.18,0)); hm.add(box(0.86,0.3,0.78,gold,0,1.82,0)); // gold end bands
      hm.add(box(0.2,0.4,0.2,gemM,0,1.5,0.4));
      holdR(hm); hm.rotation.z=0.18; armR.rotation.x=-0.2;
    } else if(race==='horde'){ const maul=new THREE.Group(); maul.add(cyl(0.12,0.12,2.4,6,leather));
      maul.add(box(0.78,0.8,0.78,steel,0,1.1,0)); maul.add(box(0.92,0.26,0.9,goldD,0,1.1,0)); maul.add(cone(0.2,0.5,5,white).translateY(1.7)); holdR(maul); maul.rotation.z=0.3; }
    else { const staff=new THREE.Group(); staff.add(cyl(0.09,0.09,2.7,6,leather));
      const claw=ring(0.28,0.07,gold); claw.position.y=1.4; claw.rotation.x=Math.PI/2; staff.add(claw);
      const orb=sph(0.2,M(P.gem,{emissive:P.gem,emissiveIntensity:.7,roughness:.3})); orb.position.y=1.4; staff.add(orb); holdR(staff); }
  }

  g.rotation.y=Math.PI;
  g.userData={legL,legR,armL,armR,headPivot,torsoPivot,race,role,phase:Math.random()*6.28};
  g.scale.setScalar(P.scale);
  g.traverse(o=>{o.castShadow=true;});
  return g;
}

/* ---- pedestals ---------------------------------------------------------- */
function pedestal(x,z){const g=cyl(2.0,2.3,0.6,16,M(0x6f7d6a)); g.position.set(x,0.3,z); g.receiveShadow=true; scene.add(g);
  const top=cyl(1.8,1.8,0.12,16,M(0x808e78)); top.position.set(x,0.66,z); top.receiveShadow=true; scene.add(top); return g;}

// ground
const ground=new THREE.Mesh(new THREE.CircleGeometry(80,40),M(0x83a85a)); ground.rotation.x=-Math.PI/2; ground.position.y=-0.02; ground.receiveShadow=true; scene.add(ground);

/* ---- layout: 3 races (rows, z) × 4 roles (cols, x) --------------------- */
const RACES=['crown','horde','elf'];
const ROLES=['worker','warrior','archer','hero'];
const ROLE_NAME={worker:'Worker',warrior:'Warrior',archer:'Archer',hero:'Hero'};
const COLX=[-16.5,-5.5,5.5,16.5];
const ROWZ=[-11,0,11];
const chars=[];
RACES.forEach((race,ri)=>{
  ROLES.forEach((role,ci)=>{
    pedestal(COLX[ci],ROWZ[ri]);
    const h=humanoid(race,role); h.position.set(COLX[ci],0.72,ROWZ[ri]); scene.add(h);
    chars.push({obj:h,x:COLX[ci],z:ROWZ[ri],name:ROLE_NAME[role],ri});
  });
});

/* ---- DOM labels --------------------------------------------------------- */
const charLabels=chars.map(c=>{const el=document.createElement('div');el.className='lbl';el.textContent=c.name;document.body.appendChild(el);return {el,c};});
const rowEls=[document.getElementById('R0'),document.getElementById('R1'),document.getElementById('R2')];
function updateLabels(){
  const v=new THREE.Vector3();
  charLabels.forEach(L=>{v.set(L.c.x,8.0,L.c.z).project(camera);
    L.el.style.left=(v.x*0.5+0.5)*innerWidth+'px';L.el.style.top=(-v.y*0.5+0.5)*innerHeight+'px';L.el.style.display=v.z<1?'block':'none';});
  rowEls.forEach((el,ri)=>{v.set(-22,4.7,ROWZ[ri]).project(camera);
    el.style.left=Math.max(10,(v.x*0.5+0.5)*innerWidth)+'px';el.style.top=(-v.y*0.5+0.5)*innerHeight+'px';el.style.display=v.z<1?'flex':'none';});
}

function applyMood(){scene.background=new THREE.Color(mood.sky);scene.fog=new THREE.Fog(mood.fog,60,160);
  amb.intensity=mood.amb;sun.color.setHex(mood.sun);sun.intensity=mood.sunI;hemi.color.setHex(mood.hemiS);hemi.groundColor.setHex(mood.hemiG);hemi.intensity=mood.hemiI;}
applyMood(); placeCam(); renderer.setSize(innerWidth,innerHeight);

/* ---- controls ---------------------------------------------------------- */
let drag=false,px=0,py=0;
C.addEventListener('pointerdown',e=>{drag=true;px=e.clientX;py=e.clientY;});
addEventListener('pointermove',e=>{if(!drag)return;camYaw-=(e.clientX-px)*0.008;camPitch=Math.max(0.12,Math.min(1.1,camPitch+(e.clientY-py)*0.006));px=e.clientX;py=e.clientY;placeCam();});
addEventListener('pointerup',()=>drag=false);
addEventListener('wheel',e=>{camDist=Math.max(24,Math.min(90,camDist+e.deltaY*0.04));placeCam();},{passive:true});
document.getElementById('bNight').onclick=function(){mood=(mood===DAY)?NIGHT:DAY;this.textContent=mood===DAY?'🌙':'☀️';applyMood();};
document.getElementById('bSpin').onclick=function(){spin=!spin;};
document.getElementById('bAnim').onclick=function(){walk=!walk;this.textContent=walk?'🧍':'🚶';};
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);placeCam();});

/* ---- animation --------------------------------------------------------- */
let t=0;
function frame(now){requestAnimationFrame(frame); t+=0.016;
  chars.forEach(c=>{const u=c.obj.userData; const ph=u.phase;
    if(walk){
      const s=Math.sin(t*7+ph)*0.6;
      u.legL.rotation.x=s; u.legR.rotation.x=-s;
      u.legL.userData.shin.rotation.x=Math.max(0,-s*0.8); u.legR.userData.shin.rotation.x=Math.max(0,s*0.8);
      if(u.role!=='archer'){ u.armL.rotation.x=-s*0.7; u.armR.rotation.x=s*0.7; }
      c.obj.position.y=0.72+Math.abs(Math.sin(t*7+ph))*0.08;
    } else {
      const b=Math.sin(t*2+ph);
      u.legL.rotation.x*=0.8; u.legR.rotation.x*=0.8; u.legL.userData.shin.rotation.x*=0.8; u.legR.userData.shin.rotation.x*=0.8;
      u.torsoPivot.scale.y=1+b*0.02; u.headPivot.rotation.y=Math.sin(t*0.8+ph)*0.16;
      c.obj.position.y=0.72+b*0.015;
    }
  });
  if(spin&&!drag){camYaw+=0.0016*16.6;placeCam();}
  updateLabels(); renderer.render(scene,camera);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
