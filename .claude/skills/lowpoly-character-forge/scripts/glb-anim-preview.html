<!doctype html><html><head><meta charset="utf-8"><style>html,body{margin:0;background:#e8d7ad}#c{display:block}</style></head>
<body><canvas id="c"></canvas>
<script src="/vendor/three.min.js"></script>
<script src="/vendor/GLTFLoader.js"></script>
<script>
var qs=new URLSearchParams(location.search), W=600,H=760, ang=+(qs.get('angle')||90), clip=+(qs.get('clip')||2), t=+(qs.get('t')||0);
var rn=new THREE.WebGLRenderer({canvas:c,antialias:true,preserveDrawingBuffer:true}); rn.setSize(W,H,false);
if(THREE.sRGBEncoding&&'outputEncoding' in rn) rn.outputEncoding=THREE.sRGBEncoding;
var sc=new THREE.Scene(); sc.background=new THREE.Color(0xe8d7ad);
var cam=new THREE.PerspectiveCamera(35,W/H,0.01,100);
sc.add(new THREE.AmbientLight(0xffffff,0.75));
var d=new THREE.DirectionalLight(0xffffff,1.0); d.position.set(5,8,4); sc.add(d);
var d2=new THREE.DirectionalLight(0xbcd3ff,0.4); d2.position.set(-4,3,-5); sc.add(d2);
window.READY=false;
new THREE.GLTFLoader().load(qs.get('model'),function(g){
  var m=g.scene; sc.add(m);
  var box=new THREE.Box3().setFromObject(m); var s=new THREE.Vector3(); box.getSize(s);
  var ctr=new THREE.Vector3(); box.getCenter(ctr); var R=Math.max(s.x,s.y,s.z);
  var mixer=new THREE.AnimationMixer(m);
  var clips=g.animations||[]; window.__clips=clips.map(function(c){return [c.name,+c.duration.toFixed(2)];});
  if(clips[clip]){ var a=mixer.clipAction(clips[clip]); a.play(); mixer.setTime(t*clips[clip].duration); }
  var rad=R*2.0, aa=ang*Math.PI/180;
  cam.position.set(Math.sin(aa)*rad - ctr.x, ctr.y + R*0.15, Math.cos(aa)*rad); cam.lookAt(ctr.x,ctr.y,ctr.z);
  rn.render(sc,cam); window.READY=true;
}, undefined, function(e){ window.__err=String(e); window.READY=true; });
</script></body></html>
