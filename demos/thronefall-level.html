<html>
<head>

<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Warcrest — Thronefall-style level</title>
<style>html,body{margin:0;height:100%;overflow:hidden;background:#8fc9e8}canvas{display:block}

  font:15px/1.35 Georgia,serif;padding:11px 14px;border-radius:9px}

  text-shadow:0 1px 2px #0007;display:flex;align-items:center;gap:6px}

<body>
<div id="tip">The <b>final wave</b> of enemies is approaching. Prepare your defenses!</div>
<div id="gold"><span class="c"></span>26</div>
<script src="/vendor/three.min.js"></script>
<script>
// ---------- palette (sampled to match Thronefall reference) ----------
const C = {
  grass:      0x46b24d, grass2: 0x3fa848, grass3: 0x54bd5a,
  path:       0xe9dcb4,
  cliffLit:   0xf0e7cd, cliffShade: 0x265f74, cliffMid: 0x4f96a8,
  water:      0x25a2e6,
  treeY:      [0xd9d43a, 0xccc636, 0xe2dc4c, 0xc2be34],
  wood:       0xd98a3a, woodDark: 0xb56b28, cream: 0xece0c0, roof: 0xc25a34,
  stone:      0xe7ddc4, stoneShade: 0xcdbf9c,
  rock:       0x8f9aa0,
  teamBlue:   0x3f74c4, teamBlueD: 0x2b57a0, hero: 0x9a5bd6, skin: 0xe0b088,
  enemyRed:   0xc23b3b,
  outline:    0x2a2018,
};

// ---------- value noise (deterministic) ----------
function frac(v){return v-Math.floor(v);}
function hash2(x,y){return frac(Math.sin(x*127.1+y*311.7)*43758.5453);}
function vnoise(x,y){
  const xi=Math.floor(x),yi=Math.floor(y),xf=x-xi,yf=y-yi;
  const u=xf*xf*(3-2*xf),v=yf*yf*(3-2*yf);
  const a=hash2(xi,yi),b=hash2(xi+1,yi),c=hash2(xi,yi+1),d=hash2(xi+1,yi+1);
  return a+(b-a)*u+(c-a)*v+(a-b-c+d)*u*v;
}
function fbm(x,y){return 0.6*vnoise(x,y)+0.3*vnoise(x*2.1,y*2.1)+0.1*vnoise(x*4.3,y*4.3);}
// seeded rng for scatter
let _s=12345; function rnd(){_s=(_s*1664525+1013904223)&0x7fffffff;return _s/0x7fffffff;}
function rr(a,b){return a+(b-a)*rnd();}

// ---------- scene ----------
let scene,cam,rnd3d;
const R=64;                         // island radius
const sun=new THREE.Vector3(-0.55,0.75,0.38).normalize();

function edgeR(theta){               // organic island outline
  return R*(0.86 + 0.09*Math.sin(theta*3+0.7) + 0.05*Math.sin(theta*7+2.1) + 0.03*Math.sin(theta*13));
}
function grassY(x,z){ return 2.2*(fbm(x*0.02+5,z*0.02+9)-0.5) + 1.0*(fbm(x*0.06,z*0.06)-0.5); }

// paths (cream) as polylines on the grass — winding, radiating from the keep
const PATHS=[
  [[-12,-2],[-2,4],[10,20],[20,34],[27,50]],
  [[-12,-2],[-22,-8],[-30,-20],[-42,-28],[-52,-34]],
  [[-12,-2],[-2,-14],[16,-24],[36,-28],[56,-22]],
  [[-12,-2],[6,2],[22,4]],
];
function pathDist(x,z){
  let best=1e9;
  for(const p of PATHS){ for(let i=0;i<p.length-1;i++){
    const [ax,az]=p[i],[bx,bz]=p[i+1]; const dx=bx-ax,dz=bz-az;
    const t=Math.max(0,Math.min(1,((x-ax)*dx+(z-az)*dz)/(dx*dx+dz*dz+1e-6)));
    const px=ax+dx*t,pz=az+dz*t; const d=Math.hypot(x-px,z-pz); if(d<best)best=d;
  }}
  return best;
}
function onIsland(x,z){ const th=Math.atan2(z,x); return Math.hypot(x,z) < edgeR(th)-2; }
function topY(x,z){ return grassY(x,z) - (pathDist(x,z)<7?0.6:0); }

// ---------- terrain builder (non-indexed for crisp facets + per-face colour) ----------
function buildTerrain(){
  const pos=[],col=[];
  const nrm=new THREE.Vector3(),ab=new THREE.Vector3(),ac=new THREE.Vector3();
  const tmp=new THREE.Color();
  function pushTri(va,vb,vc,region){
    ab.set(vb[0]-va[0],vb[1]-va[1],vb[2]-va[2]); ac.set(vc[0]-va[0],vc[1]-va[1],vc[2]-va[2]);
    nrm.crossVectors(ab,ac).normalize();
    const mx=(va[0]+vb[0]+vc[0])/3, mz=(va[2]+vb[2]+vc[2])/3;
    // orient consistently: grass up, cliff outward — so the colour test is stable
    if(region==='grass'){ if(nrm.y<0) nrm.negate(); }
    else { if(nrm.x*mx+nrm.z*mz<0) nrm.negate(); }
    let hex;
    if(region==='grass'){
      if(pathDist(mx,mz)<6.5) hex=C.path;
      else { const n=fbm(mx*0.04,mz*0.04); hex = n>0.74?C.grass3 : n<0.30?C.grass2 : C.grass; }
    } else { // cliff: stratified cream→teal→deep-blue by depth, nudged by sun
      const avgY=(va[1]+vb[1]+vc[1])/3;
      const dep=Math.min(1,Math.max(0,(edgeTopY-avgY)/(edgeTopY-bottomY)));
      const lit=nrm.dot(sun);
      if(dep<0.30 || nrm.y>0.5) hex=C.cliffLit;
      else if(dep<0.60) hex = lit>0.0 ? C.cliffLit : C.cliffMid;
      else hex = lit>0.12 ? C.cliffMid : C.cliffShade;
    }
    tmp.setHex(hex);
    for(const P of [va,vb,vc]){ pos.push(P[0],P[1],P[2]); col.push(tmp.r,tmp.g,tmp.b); }
  }
  const NT=76, GR=11, CR=7, bottomY=-38, edgeTopY=-1.5;
  // precompute rings of the top surface
  const gridT=[]; // gridT[i][j] = [x,y,z], i:0..GR (ring), j:0..NT
  for(let i=0;i<=GR;i++){ const row=[]; const rr0=i/GR;
    for(let j=0;j<=NT;j++){ const th=j/NT*Math.PI*2; const er=edgeR(th);
      const rad=rr0*er; const x=rad*Math.cos(th), z=rad*Math.sin(th);
      let y = topY(x,z); if(i===GR) y=edgeTopY;               // lock the rim
      row.push([x,y,z]);
    } gridT.push(row);
  }
  for(let i=0;i<GR;i++) for(let j=0;j<NT;j++){
    const a=gridT[i][j],b=gridT[i][j+1],c=gridT[i+1][j+1],d=gridT[i+1][j];
    pushTri(a,b,c,'grass'); pushTri(a,c,d,'grass');
  }
  // cliff band: from rim ring down & inward to a rounded taper, craggy + faceted
  const cliffRings=[gridT[GR].slice()];
  for(let k=1;k<=CR;k++){
    const t=k/CR; const row=[];
    for(let j=0;j<=NT;j++){ const th=j/NT*Math.PI*2; const er=edgeR(th);
      const shrink=Math.pow(Math.cos(t*Math.PI*0.5),0.6);      // wider longer → taller vertical wall
      const drop  =Math.sin(t*Math.PI*0.5);                    // 0→1 fast at top
      const crag = (fbm(Math.cos(th)*3+k, Math.sin(th)*3+k)-0.5);
      const rad = er*shrink + er*0.08*(1-t) + crag*10*(1-t*0.4); // flare out past grass, chunky facets
      const y = edgeTopY + (bottomY-edgeTopY)*drop + crag*6;
      row.push([rad*Math.cos(th), y, rad*Math.sin(th)]);
    }
    cliffRings.push(row);
  }
  for(let k=0;k<cliffRings.length-1;k++) for(let j=0;j<NT;j++){
    const a=cliffRings[k][j],b=cliffRings[k][j+1],c=cliffRings[k+1][j+1],d=cliffRings[k+1][j];
    pushTri(a,b,c,'cliff'); pushTri(a,c,d,'cliff');
  }
  const g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
  g.setAttribute('color',new THREE.Float32BufferAttribute(col,3));
  g.computeVertexNormals();
  const m=new THREE.MeshLambertMaterial({vertexColors:true,flatShading:true,side:THREE.DoubleSide});
  const mesh=new THREE.Mesh(g,m); mesh.receiveShadow=true; mesh.castShadow=false;
  return mesh;
}

// ---------- helpers ----------
function lam(hex,flat){return new THREE.MeshLambertMaterial({color:hex,flatShading:!!flat});}
function outlineOf(mesh,scale){
  const o=new THREE.Mesh(mesh.geometry,new THREE.MeshBasicMaterial({color:C.outline,side:THREE.BackSide}));
  o.scale.multiplyScalar(scale||1.06); return o;
}
function box(w,h,d,hex,flat){const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),lam(hex,flat));m.castShadow=true;m.receiveShadow=true;return m;}
function outlined(group){ // wrap: add black inverted hull for each child mesh
  const adds=[];
  group.traverse(o=>{ if(o.isMesh){ const h=new THREE.Mesh(o.geometry,new THREE.MeshBasicMaterial({color:C.outline,side:THREE.BackSide}));
    h.position.copy(o.position); h.rotation.copy(o.rotation); h.scale.copy(o.scale).multiplyScalar(1.05); adds.push([o.parent||group,h]); } });
  for(const [p,h] of adds) p.add(h);
  return group;
}

// ---------- trees: yellow broccoli clusters ----------
function makeTree(){
  const g=new THREE.Group();
  const blobs=4+Math.floor(rnd()*4);
  const base=2.2+rnd()*1.4;
  for(let i=0;i<blobs;i++){
    const r=base*(0.6+rnd()*0.6);
    const s=new THREE.Mesh(new THREE.IcosahedronGeometry(r,0), lam(C.treeY[Math.floor(rnd()*C.treeY.length)],true));
    s.position.set(rr(-base,base), 3.2+rr(-0.6,1.6)+i*0.3, rr(-base,base));
    s.castShadow=true; g.add(s);
  }
  const trunk=new THREE.Mesh(new THREE.CylinderGeometry(0.5,0.7,3,6),lam(C.woodDark));
  trunk.position.y=1.5; trunk.castShadow=true; g.add(trunk);
  return g;
}
function forestClump(cx,cz,n,spread){
  const grp=new THREE.Group();
  for(let i=0;i<n;i++){ const t=makeTree(); const a=rnd()*6.28, d=rnd()*spread;
    const x=cx+Math.cos(a)*d, z=cz+Math.sin(a)*d; if(!onIsland(x,z))continue;
    t.position.set(x, topY(x,z), z); grp.add(t);
  } return grp;
}

// ---------- buildings ----------
function dirtPad(x,z,r){
  const m=new THREE.Mesh(new THREE.CylinderGeometry(r,r,0.4,14),lam(C.path));
  m.position.set(x,topY(x,z)+0.05,z); m.receiveShadow=true; return m;
}
function makeHouse(){
  const g=new THREE.Group();
  const w=6.5,d=5,wall=4;
  g.add(box(w,wall,d,C.cream)).children[g.children.length-1].position.y=wall/2;
  const roof=new THREE.Mesh(new THREE.ConeGeometry(w*0.78,3.4,4),lam(C.roof,true));
  roof.rotation.y=Math.PI/4; roof.position.y=wall+1.5; roof.castShadow=true; g.add(roof);
  g.traverse(o=>{if(o.isMesh)o.castShadow=o.receiveShadow=true;});
  return outlined(g);
}
function makeKeep(){
  const g=new THREE.Group();
  const base=box(13,7,13,C.stone); base.position.y=3.5; g.add(base);
  // crenellations around base top
  const s=6.5, y=7.4;
  for(let i=-2;i<=2;i++){ for(const [px,pz] of [[i*2.8,s],[i*2.8,-s],[s,i*2.8],[-s,i*2.8]]){
    const c=box(1.6,1.8,1.6,C.stoneShade); c.position.set(px,y,pz); g.add(c);
  }}
  const tower=box(6,10,6,C.stone); tower.position.y=11; g.add(tower);
  for(let i=-1;i<=1;i++){ for(const [px,pz] of [[i*2.2,3],[i*2.2,-3],[3,i*2.2],[-3,i*2.2]]){
    const c=box(1.3,1.6,1.3,C.stoneShade); c.position.set(px,16.3,pz); g.add(c);
  }}
  // banner
  const pole=new THREE.Mesh(new THREE.CylinderGeometry(0.2,0.2,6,5),lam(C.woodDark)); pole.position.set(0,19,0); g.add(pole);
  const flag=box(3,1.8,0.2,C.teamBlue); flag.position.set(1.6,20.5,0); g.add(flag);
  g.traverse(o=>{if(o.isMesh)o.castShadow=o.receiveShadow=true;});
  return outlined(g);
}
function makeWatchtower(){
  const g=new THREE.Group();
  for(const [sx,sz] of [[1,1],[1,-1],[-1,1],[-1,-1]]){
    const leg=new THREE.Mesh(new THREE.CylinderGeometry(0.4,0.4,9,5),lam(C.woodDark));
    leg.position.set(sx*2,4.5,sz*2); leg.rotation.set(sz*0.08,0,-sx*0.08); g.add(leg);
  }
  const plat=box(6,1,6,C.wood); plat.position.y=9.2; g.add(plat);
  const rail=box(6.2,1.6,6.2,C.woodDark); rail.position.y=10.3; g.add(rail);
  const inner=box(4.6,1.7,4.6,C.wood); inner.position.y=10.35; g.add(inner);
  const roof=new THREE.Mesh(new THREE.ConeGeometry(4.6,3,4),lam(C.roof,true)); roof.rotation.y=Math.PI/4; roof.position.y=12.6; g.add(roof);
  g.traverse(o=>{if(o.isMesh)o.castShadow=o.receiveShadow=true;});
  return outlined(g);
}
function makeWindmill(){
  const g=new THREE.Group();
  const tower=new THREE.Mesh(new THREE.CylinderGeometry(2.4,3.2,8,8),lam(C.cream)); tower.position.y=4; g.add(tower);
  const cap=new THREE.Mesh(new THREE.ConeGeometry(2.8,2.4,8),lam(C.roof,true)); cap.position.y=9; g.add(cap);
  const hub=new THREE.Group(); hub.position.set(0,7.5,2.6);
  for(let i=0;i<4;i++){ const sail=box(1.4,7,0.3,C.wood); sail.position.y=0; sail.rotation.z=i*Math.PI/2;
    const holder=new THREE.Group(); holder.rotation.z=i*Math.PI/2; const s=box(1.3,6.5,0.25,C.cream); s.position.y=3.5; holder.add(s); hub.add(holder);
  }
  g.add(hub);
  g.traverse(o=>{if(o.isMesh)o.castShadow=o.receiveShadow=true;});
  return outlined(g);
}
function makeWall(len){
  const g=new THREE.Group();
  for(let i=0;i<len;i++){ const p=box(1.5,3.2,1.8,i%2?C.woodDark:C.wood); p.position.set(i*1.6-len*0.8,1.6,0); g.add(p);}
  g.traverse(o=>{if(o.isMesh)o.castShadow=o.receiveShadow=true;});
  return outlined(g);
}
function makeRock(){
  const m=new THREE.Mesh(new THREE.IcosahedronGeometry(1.6+rnd()*1.4,0),lam(C.rock,true)); m.castShadow=true; m.receiveShadow=true;
  m.rotation.set(rnd(),rnd(),rnd()); return outlined(new THREE.Group().add(m));
}

// ---------- units ----------
function makeUnit(bodyHex,scale){
  const g=new THREE.Group(); scale=scale||1;
  const body=new THREE.Mesh(new THREE.CapsuleGeometry(0.5,1.0,3,6),lam(bodyHex)); body.position.y=1.0; g.add(body);
  const head=new THREE.Mesh(new THREE.SphereGeometry(0.42,8,8),lam(C.skin)); head.position.y=2.0; g.add(head);
  const spear=new THREE.Mesh(new THREE.CylinderGeometry(0.07,0.07,3,5),lam(C.woodDark)); spear.position.set(0.5,1.4,0); spear.rotation.z=0.15; g.add(spear);
  g.traverse(o=>{if(o.isMesh)o.castShadow=true;});
  g.scale.setScalar(scale);
  return outlined(g);
}
function place(obj,x,z,ry){ obj.position.set(x,topY(x,z),z); if(ry!=null)obj.rotation.y=ry; scene.add(obj); return obj; }

// ---------- assemble ----------
function build(){
  scene=new THREE.Scene();
  scene.background=new THREE.Color(0x3f9fd6);
  scene.fog=new THREE.Fog(0x3f9fd6, 250, 420);

  // lights
  scene.add(new THREE.HemisphereLight(0xdff0ff,0x3f6a44,0.55));
  const dir=new THREE.DirectionalLight(0xfff3d8,1.05);
  dir.position.copy(sun.clone().multiplyScalar(120)); dir.castShadow=true;
  dir.shadow.mapSize.set(2048,2048);
  const sc=dir.shadow.camera; sc.left=-95;sc.right=95;sc.top=95;sc.bottom=-95;sc.near=20;sc.far=320;
  dir.shadow.bias=-0.0004; dir.shadow.normalBias=1.4; dir.shadow.radius=3;
  scene.add(dir); scene.add(dir.target);

  // water (big flat plane below rim)
  const water=new THREE.Mesh(new THREE.CircleGeometry(R*3.2,48),
    new THREE.MeshLambertMaterial({color:C.water}));
  water.rotation.x=-Math.PI/2; water.position.y=-18; scene.add(water);

  scene.add(buildTerrain());

  // perimeter forest hedgerows (yellow) — set inward so the cliff rim stays bare
  for(let a=0;a<Math.PI*2;a+=0.18){
    const er=edgeR(a)-15; const x=Math.cos(a)*er, z=Math.sin(a)*er;
    if(onIsland(x,z)) scene.add(forestClump(x,z,3,8));
  }
  // interior clumps
  scene.add(forestClump(-38,26,5,10));
  scene.add(forestClump(30,-40,5,10));
  scene.add(forestClump(-10,-48,4,9));

  // buildings on cleared pads
  const KX=-12,KZ=-2;
  scene.add(dirtPad(KX,KZ,11)); place(makeKeep(),KX,KZ,0.3);
  const spots=[[-34,-18],[-40,6],[-28,20],[6,-22]];
  for(const [x,z] of spots){ scene.add(dirtPad(x,z,6)); place(makeHouse(),x,z,rr(0,6.28)); }
  scene.add(dirtPad(2,10,6)); place(makeWatchtower(),2,10,0);
  scene.add(dirtPad(-4,-34,7)); place(makeWindmill(),-4,-34,0.5);
  place(makeWall(9),24,-4,0.5);
  scene.add(dirtPad(22,4,7)); place(makeKeep(),22,4,-0.4).scale.setScalar(0.55); // small gate tower

  // rocks scattered
  for(let i=0;i<10;i++){ const a=rnd()*6.28,d=rr(10,R*0.7); const x=Math.cos(a)*d,z=Math.sin(a)*d;
    if(onIsland(x,z)) place(makeRock(),x,z); }

  // live fighters (hero + squad + enemies) are spawned by the gameplay module
}

// ================= GAMEPLAY: control-direction test =================
// Pilot the hero (joystick / WASD); the squad auto-follows & auto-fights;
// tap the ground to rally them; STOMP button = warstomp. Survive the wave.
let hero=null, allies=[], enemies=[];
let rallyPoint=null, rallyMarker=null, gameOver=0, spawnLeft=16, spawnTimer=1.2, killed=0;
let keys={}, joy={active:false,nx:0,ny:0,id:null,sx:0,sy:0};
let heroHpEl, waveEl, resultEl, abilEl, joyBase, joyKnob;
const raycaster=new THREE.Raycaster(), groundPlane=new THREE.Plane(new THREE.Vector3(0,1,0),0);
const camF={pitch:52,az:34,dist:94,lookY:4,pos:new THREE.Vector3(),init:false};

function makeBar(fillHex){
  const g=new THREE.Group(), w=3.4,h=0.5;
  g.add(new THREE.Mesh(new THREE.PlaneGeometry(w,h),new THREE.MeshBasicMaterial({color:0x14110c})));
  const fl=new THREE.Mesh(new THREE.PlaneGeometry(w,h),new THREE.MeshBasicMaterial({color:fillHex}));
  fl.position.z=0.02; g.add(fl); g.__fl=fl; g.__w=w; g.visible=false; scene.add(g); return g;
}
function mkFighter(hex,scale,team,st){
  const g=makeUnit(hex,scale); scene.add(g);
  const e=Object.assign({g,team,alive:true,cd:0,px:0,pz:0,hitT:0,
    bar:makeBar(team==='enemy'?0xd23b3b:0x4ad0e0)},st);
  e.max=st.hp; return e;
}
function setP(e,x,z){ e.px=x; e.pz=z; e.g.position.set(x,topY(x,z),z); }
function faceTo(e,dx,dz){ if(dx||dz) e.g.rotation.y=Math.atan2(dx,dz); }
function spawnGame(){
  hero=mkFighter(C.hero,1.9,'hero',{hp:260,dmg:20,range:3.6,atkEvery:0.5,spd:32,aCd:0}); setP(hero,-2,8);
  for(let i=0;i<8;i++){ const e=mkFighter(i%2?C.teamBlue:C.teamBlueD,1.0,'ally',{hp:60,dmg:10,range:2.5,atkEvery:0.8,spd:22});
    e.ox=((i%4)-1.5)*3.6; e.oz=Math.floor(i/4)*3.6+6; setP(e,-2+e.ox,12+e.oz); allies.push(e); }
  rallyMarker=new THREE.Mesh(new THREE.RingGeometry(1.6,2.3,22),new THREE.MeshBasicMaterial({color:0xffe089,transparent:true,opacity:0.9,side:THREE.DoubleSide}));
  rallyMarker.rotation.x=-Math.PI/2; rallyMarker.visible=false; scene.add(rallyMarker);
}
function spawnEnemy(){ const a=0.25+rr(-0.6,0.6), er=edgeR(a)-10, x=Math.cos(a)*er, z=Math.sin(a)*er;
  if(!onIsland(x,z))return; const e=mkFighter(C.enemyRed,1.05,'enemy',{hp:36,dmg:6,range:2.5,atkEvery:1.0,spd:14}); setP(e,x,z); enemies.push(e); }
function nearest(x,z,list){ let b=null,bd=1e9; for(const t of list){ if(!t.alive)continue; const d=(t.px-x)**2+(t.pz-z)**2; if(d<bd){bd=d;b=t;} } return {t:b,d:Math.sqrt(bd)}; }
function moveTo(e,tx,tz,dt){ let dx=tx-e.px,dz=tz-e.pz; const d=Math.hypot(dx,dz)||1; dx/=d;dz/=d;
  const nx=e.px+dx*e.spd*dt, nz=e.pz+dz*e.spd*dt; if(onIsland(nx,nz)){setP(e,nx,nz);faceTo(e,dx,dz);} return d; }
function attack(a,d){ if(a.cd>0)return; d.hp-=a.dmg; d.hitT=0.12; a.cd=a.atkEvery; faceTo(a,d.px-a.px,d.pz-a.pz); }
function groundBasis(){ const f=new THREE.Vector3(); cam.getWorldDirection(f); f.y=0; f.normalize();
  const r=new THREE.Vector3().crossVectors(f,new THREE.Vector3(0,1,0)).normalize(); return {f,r}; }
function warstomp(){ if(!hero||hero.aCd>0||gameOver)return; hero.aCd=5;
  for(const e of enemies){ if(!e.alive)continue; const d=Math.hypot(e.px-hero.px,e.pz-hero.pz);
    if(d<11){ e.hp-=50; e.hitT=0.25; const nx=e.px+(e.px-hero.px)/(d||1)*5, nz=e.pz+(e.pz-hero.pz)/(d||1)*5; if(onIsland(nx,nz))setP(e,nx,nz);} }
  const r=new THREE.Mesh(new THREE.RingGeometry(1,2,26),new THREE.MeshBasicMaterial({color:0xffd060,transparent:true,side:THREE.DoubleSide}));
  r.rotation.x=-Math.PI/2; r.position.set(hero.px,topY(hero.px,hero.pz)+0.5,hero.pz); scene.add(r);
  let t=0;(function an(){t+=0.05;r.scale.setScalar(1+t*11);r.material.opacity=Math.max(0,0.9-t);if(t<0.9)requestAnimationFrame(an);else scene.remove(r);})();
}
function endGame(win){ gameOver=win?1:2; resultEl.style.display='flex';
  const h=resultEl.querySelector('h1'); h.textContent=win?'Victory!':'Defeated'; h.style.color=win?'#8be04a':'#e05a5a'; }
function updBars(){ const all=[hero,...allies,...enemies];
  for(const e of all){ if(!e||!e.alive)continue; const f=Math.max(0,e.hp/e.max);
    e.bar.visible=(e.team!=='hero'); e.bar.__fl.scale.x=f; e.bar.__fl.position.x=-(1-f)*e.bar.__w/2;
    e.bar.position.set(e.px, topY(e.px,e.pz)+(e.team==='hero'?7:4.4), e.pz); e.bar.quaternion.copy(cam.quaternion);
    e.hitT-=0.016; e.g.traverse(o=>{ if(o.isMesh&&o.material&&o.material.emissive) o.material.emissive.setHex(e.hitT>0?0x992a1a:0x000000); });
  } }
function updateGame(dt){
  if(!hero) return;
  if(!gameOver){
    if(spawnLeft>0){ spawnTimer-=dt; if(spawnTimer<=0){ spawnEnemy(); spawnLeft--; spawnTimer=rr(0.6,1.5);} }
    // hero movement
    let ix=0,iy=0;
    if(joy.active){ ix=joy.nx; iy=joy.ny; }
    else { if(keys['w']||keys['arrowup'])iy-=1; if(keys['s']||keys['arrowdown'])iy+=1; if(keys['a']||keys['arrowleft'])ix-=1; if(keys['d']||keys['arrowright'])ix+=1; }
    const B=groundBasis(); let mvx=B.f.x*(-iy)+B.r.x*ix, mvz=B.f.z*(-iy)+B.r.z*ix; const ml=Math.hypot(mvx,mvz);
    if(ml>0.01){ mvx/=ml;mvz/=ml; const nx=hero.px+mvx*hero.spd*dt, nz=hero.pz+mvz*hero.spd*dt; if(onIsland(nx,nz))setP(hero,nx,nz); faceTo(hero,mvx,mvz); }
    hero.cd-=dt; hero.aCd-=dt;
    { const {t,d}=nearest(hero.px,hero.pz,enemies); if(t&&d<=hero.range+1) attack(hero,t); }
    for(const e of allies){ if(!e.alive)continue; e.cd-=dt; const {t,d}=nearest(e.px,e.pz,enemies);
      const engage=t&&(d<24||Math.hypot(t.px-hero.px,t.pz-hero.pz)<28);
      if(engage){ if(d>e.range)moveTo(e,t.px,t.pz,dt); else attack(e,t); }
      else { const tx=rallyPoint?rallyPoint.x:hero.px+e.ox, tz=rallyPoint?rallyPoint.z:hero.pz+e.oz; if(Math.hypot(tx-e.px,tz-e.pz)>2.6)moveTo(e,tx,tz,dt); } }
    for(const e of enemies){ if(!e.alive)continue; e.cd-=dt; const {t,d}=nearest(e.px,e.pz,[hero,...allies]);
      if(t&&d<70){ if(d>e.range)moveTo(e,t.px,t.pz,dt); else attack(e,t); } else moveTo(e,-2,0,dt); }
    const reap=l=>{ for(const e of l){ if(e.alive&&e.hp<=0){ e.alive=false; scene.remove(e.g); scene.remove(e.bar); if(e.team==='enemy')killed++; } } return l.filter(e=>e.alive); };
    allies=reap(allies); enemies=reap(enemies);
    if(hero.hp<=0) endGame(false); else if(spawnLeft===0&&enemies.length===0) endGame(true);
    if(heroHpEl) heroHpEl.style.width=(Math.max(0,hero.hp)/hero.max*100)+'%';
    if(waveEl) waveEl.textContent = spawnLeft>0? 'Enemies remaining: '+(enemies.length+spawnLeft) : (enemies.length? 'Clear them out! '+enemies.length+' left':'');
    if(abilEl) abilEl.style.opacity = hero.aCd>0? 0.45 : 1;
  }
  updBars();
}
function followCam(){ const p=camF.pitch*Math.PI/180,a=camF.az*Math.PI/180, hy=camF.dist*Math.sin(p),hz=camF.dist*Math.cos(p);
  const tx=hero?hero.px:0, tz=hero?hero.pz:0; const want=new THREE.Vector3(tx+Math.sin(a)*hz,hy,tz+Math.cos(a)*hz);
  if(!camF.init){ camF.pos.copy(want); camF.init=true; } else camF.pos.lerp(want,0.12);
  cam.position.copy(camF.pos); cam.lookAt(tx,camF.lookY,tz); }
function setupHUD(){
  addEventListener('keydown',e=>keys[e.key.toLowerCase()]=true);
  addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);
  const hp=document.createElement('div'); hp.style.cssText='position:fixed;left:50%;top:14px;transform:translateX(-50%);width:240px;height:16px;background:#0006;border:2px solid #0008;border-radius:8px;overflow:hidden;z-index:5';
  heroHpEl=document.createElement('div'); heroHpEl.style.cssText='height:100%;width:100%;background:linear-gradient(#a6ec5e,#6fbf34)'; hp.appendChild(heroHpEl); document.body.appendChild(hp);
  waveEl=document.createElement('div'); waveEl.style.cssText='position:fixed;left:50%;top:36px;transform:translateX(-50%);color:#fff;font:600 13px system-ui;text-shadow:0 1px 2px #000;z-index:5'; document.body.appendChild(waveEl);
  joyBase=document.createElement('div'); joyBase.style.cssText='position:fixed;width:120px;height:120px;border-radius:50%;background:#fff2;border:2px solid #fff6;display:none;pointer-events:none;z-index:5';
  joyKnob=document.createElement('div'); joyKnob.style.cssText='position:absolute;left:50%;top:50%;width:54px;height:54px;border-radius:50%;background:#fff9;transform:translate(-50%,-50%)'; joyBase.appendChild(joyKnob); document.body.appendChild(joyBase);
  abilEl=document.createElement('div'); abilEl.textContent='STOMP'; abilEl.style.cssText='position:fixed;right:26px;bottom:26px;width:88px;height:88px;border-radius:50%;background:#c25a34;color:#fff;font:800 15px system-ui;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 0 #7d3417;user-select:none;z-index:6'; document.body.appendChild(abilEl);
  abilEl.addEventListener('pointerdown',ev=>{ev.stopPropagation(); warstomp();});
  resultEl=document.createElement('div'); resultEl.style.cssText='position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;background:#0008;color:#fff;font:600 18px system-ui;gap:12px;z-index:9';
  resultEl.innerHTML='<h1 style="font-size:48px;margin:0"></h1><div>tap to play again</div>'; resultEl.addEventListener('pointerdown',()=>location.reload()); document.body.appendChild(resultEl);
  const gold=document.getElementById('gold'); if(gold){ gold.style.right='auto'; gold.style.left='18px'; }
  addEventListener('pointerdown',onDown); addEventListener('pointermove',onMove); addEventListener('pointerup',onUp); addEventListener('pointercancel',onUp);
}
let tap={x:0,y:0,t:0,side:0,moved:false};
function onDown(e){ if(gameOver)return; const left=e.clientX<innerWidth*0.5; tap={x:e.clientX,y:e.clientY,t:performance.now(),side:left?0:1,moved:false};
  if(left){ joy.active=true; joy.id=e.pointerId; joy.sx=e.clientX; joy.sy=e.clientY; joy.nx=0;joy.ny=0; joyBase.style.display='block'; joyBase.style.left=(e.clientX-60)+'px'; joyBase.style.top=(e.clientY-60)+'px'; joyKnob.style.left='50%';joyKnob.style.top='50%'; } }
function onMove(e){ if(joy.active&&e.pointerId===joy.id){ let dx=e.clientX-joy.sx,dy=e.clientY-joy.sy; const d=Math.hypot(dx,dy),R=54; if(d>4)tap.moved=true; const cl=Math.min(d,R),ang=Math.atan2(dy,dx),kx=Math.cos(ang)*cl,ky=Math.sin(ang)*cl;
  joy.nx=kx/R; joy.ny=ky/R; joyKnob.style.left=(50+kx*0.8)+'%'; joyKnob.style.top=(50+ky*0.8)+'%'; } }
function onUp(e){ if(joy.active&&e.pointerId===joy.id){ joy.active=false; joy.nx=0;joy.ny=0; joyBase.style.display='none'; }
  if(tap.side===1&&!tap.moved&&performance.now()-tap.t<300){ const nd=new THREE.Vector2((tap.x/innerWidth)*2-1,-(tap.y/innerHeight)*2+1); raycaster.setFromCamera(nd,cam); const hit=new THREE.Vector3();
    if(raycaster.ray.intersectPlane(groundPlane,hit)&&onIsland(hit.x,hit.z)){ rallyPoint={x:hit.x,z:hit.z}; rallyMarker.position.set(hit.x,topY(hit.x,hit.z)+0.3,hit.z); rallyMarker.visible=true; clearTimeout(rallyMarker.__to); rallyMarker.__to=setTimeout(()=>{rallyPoint=null;rallyMarker.visible=false;},4500); } } }

// ---------- camera / render ----------
function setCam(pitchDeg,dist,fov,az,lookY){
  const p=pitchDeg*Math.PI/180, a=(az||34)*Math.PI/180;
  const hy=dist*Math.sin(p), hz=dist*Math.cos(p);
  cam.fov=fov||30; cam.updateProjectionMatrix();
  cam.position.set(Math.sin(a)*hz, hy, Math.cos(a)*hz);
  cam.lookAt(0,lookY||-2,0);
}
window.__cam=setCam;

// ---------- chromatic-offset "screenprint" post pass ----------
let rt,postScene,postCam,postMat;
function pr(){return Math.min(devicePixelRatio,2);}
function initPost(){
  rt=new THREE.WebGLRenderTarget(innerWidth*pr(),innerHeight*pr(),{samples:4});
  postCam=new THREE.OrthographicCamera(-1,1,1,-1,0,1);
  postScene=new THREE.Scene();
  postMat=new THREE.ShaderMaterial({
    uniforms:{tDiffuse:{value:rt.texture},uAmt:{value:2.2},uRes:{value:new THREE.Vector2(innerWidth,innerHeight)}},
    vertexShader:'varying vec2 vUv;void main(){vUv=uv;gl_Position=vec4(position.xy,0.,1.);}',
    fragmentShader:[
      'uniform sampler2D tDiffuse;uniform float uAmt;uniform vec2 uRes;varying vec2 vUv;',
      'void main(){',
      '  vec2 d=vUv-0.5; float r2=dot(d,d);',
      '  vec2 off=d*(uAmt/uRes)*(1.0+r2*3.0);',   // stronger toward edges
      '  float cr=texture2D(tDiffuse,vUv+off).r;',
      '  float cg=texture2D(tDiffuse,vUv).g;',
      '  float cb=texture2D(tDiffuse,vUv-off).b;',
      '  vec3 col=vec3(cr,cg,cb);',
      '  col*=1.0-r2*0.28;',                      // gentle vignette
      '  gl_FragColor=vec4(col,1.0);',
      '}'].join('\n')
  });
  postScene.add(new THREE.Mesh(new THREE.PlaneGeometry(2,2),postMat));
}

function boot(){
  rnd3d=new THREE.WebGLRenderer({antialias:true});
  rnd3d.setSize(innerWidth,innerHeight); rnd3d.setPixelRatio(pr());
  rnd3d.shadowMap.enabled=true; rnd3d.shadowMap.type=THREE.PCFSoftShadowMap;
  if('outputColorSpace' in rnd3d) rnd3d.outputColorSpace=THREE.SRGBColorSpace;
  document.body.appendChild(rnd3d.domElement);
  cam=new THREE.PerspectiveCamera(30,innerWidth/innerHeight,1,600);
  build(); initPost(); spawnGame(); setupHUD(); followCam();
  addEventListener('resize',()=>{
    rnd3d.setSize(innerWidth,innerHeight); cam.aspect=innerWidth/innerHeight; cam.updateProjectionMatrix();
    rt.setSize(innerWidth*pr(),innerHeight*pr()); postMat.uniforms.uRes.value.set(innerWidth,innerHeight);
  });
  let last=performance.now();
  (function loop(){ requestAnimationFrame(loop);
    const now=performance.now(); let dt=(now-last)/1000; last=now; if(dt>0.05)dt=0.05;
    updateGame(dt); followCam();
    rnd3d.setRenderTarget(rt); rnd3d.render(scene,cam);
    rnd3d.setRenderTarget(null); rnd3d.render(postScene,postCam);
  })();
  window.__ready=true;
}
boot();
</script>
</body>
