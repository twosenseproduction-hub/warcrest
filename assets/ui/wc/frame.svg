<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f9e3a0"/>
      <stop offset="0.42" stop-color="#d8a942"/>
      <stop offset="0.56" stop-color="#b07f24"/>
      <stop offset="1" stop-color="#6c4c15"/>
    </linearGradient>
    <linearGradient id="stone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#322617"/>
      <stop offset="0.5" stop-color="#23190d"/>
      <stop offset="1" stop-color="#160f07"/>
    </linearGradient>
    <radialGradient id="boss" cx="0.35" cy="0.32" r="0.8">
      <stop offset="0" stop-color="#ffeeb8"/>
      <stop offset="0.5" stop-color="#d8a942"/>
      <stop offset="1" stop-color="#7a571a"/>
    </radialGradient>
  </defs>
  <!-- stone center fill -->
  <rect x="0" y="0" width="100" height="100" rx="7" fill="url(#stone)"/>
  <!-- dark outer edge -->
  <rect x="1.5" y="1.5" width="97" height="97" rx="6.5" fill="none" stroke="#0b0804" stroke-width="3"/>
  <!-- gold band -->
  <rect x="6.5" y="6.5" width="87" height="87" rx="4.5" fill="none" stroke="url(#gold)" stroke-width="7"/>
  <!-- gold top highlight -->
  <rect x="4.2" y="4.2" width="91.6" height="91.6" rx="5.5" fill="none" stroke="#ffeec0" stroke-width="0.9" opacity="0.65"/>
  <!-- inner dark shadow -->
  <rect x="11" y="11" width="78" height="78" rx="3" fill="none" stroke="#0b0804" stroke-width="2.6"/>
  <!-- corner bosses -->
  <g stroke="#0b0804" stroke-width="1.4">
    <circle cx="9" cy="9" r="5.6" fill="url(#boss)"/>
    <circle cx="91" cy="9" r="5.6" fill="url(#boss)"/>
    <circle cx="9" cy="91" r="5.6" fill="url(#boss)"/>
    <circle cx="91" cy="91" r="5.6" fill="url(#boss)"/>
  </g>
</svg>
